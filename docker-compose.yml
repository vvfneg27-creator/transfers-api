services:

  mongodb:
    image: mongo:4.4
    container_name: transfers-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongo_data:/data/db

  mysql:
    image: mysql:8.0
    container_name: transfers-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: transfers-db
    volumes:
      - mysql_data:/data/db

  memcached:
    image: memcached:1.6
    container_name: transfers-memcached
    restart: always
    ports:
      - "11211:11211"

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: transfers-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  app:
    image: transfers-api:0.1.0
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transfers-api
    depends_on:
      - mongodb
    ports:
      - "8080:8080"

    environment:
      # ---- Business ----
      TRANSFER_MIN_AMOUNT: 1

      # ---- Mongo ----
      MONGODB_CONNECT_TIMEOUT: 10s
      MONGODB_HOSTNAME: mongodb
      MONGODB_PORT: 27017
      MONGODB_USERNAME: root
      MONGODB_PASSWORD: root
      MONGODB_DATABASE: transfers-db
      MONGODB_COLLECTION: transfers

    restart: always

volumes:
  mongo_data:
  mysql_data: